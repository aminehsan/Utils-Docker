services:
  metabase:
    container_name: metabase
    image: metabase/metabase:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: "curl -f -I http://localhost:3000/api/health"
      interval: 10s
      timeout: 5s
      retries: 2

volumes:
  metabase_data:
