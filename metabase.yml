services:
  metabase:
    container_name: metabase
    image: metabase/metabase:latest # metabase/metabase:latest -> metabase/metabase:v0.62.3.5
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Tehran
    volumes:
      - metabase_data:/metabase.db
    healthcheck:
      test: "curl -f -I http://localhost:3000/api/health"
      interval: 10s
      timeout: 5s
      retries: 2

volumes:
  metabase_data:
